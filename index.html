<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes, viewport-fit=cover">
  <title>地球Online｜开放世界游戏</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Serif+SC:wght@400;500;600;700;900&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --font-heading: 'Noto Serif SC', 'Times New Roman', '宋体', serif;
      --font-body: 'Inter', 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
    }

    body {
      font-family: var(--font-body);
      background: #030308;
      color: #e8e6e1;
      line-height: 1.5;
      overflow-x: hidden;
      margin: 0;
      -webkit-font-smoothing: antialiased;
      transition: background 0.4s;
      cursor: default;
    }

    body.cn {
      --accent: #c41e3a;
      --accent-glow: #e74c3c;
    }
    body.world {
      --accent: #1a5276;
      --accent-glow: #2980b9;
    }

    .cursor-glow {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 9999;
      background: radial-gradient(circle 300px at 50% 50%, rgba(196, 30, 58, 0.06), transparent 70%);
      transition: opacity 0.2s;
    }
    body.world .cursor-glow {
      background: radial-gradient(circle 300px at 50% 50%, rgba(41, 128, 185, 0.06), transparent 70%);
    }

    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.8rem 6%;
      background: transparent;
      transition: background 0.4s, backdrop-filter 0.4s;
      flex-wrap: wrap;
      gap: 0.8rem;
    }
    .navbar.scrolled {
      background: rgba(8, 8, 14, 0.75);
      backdrop-filter: blur(18px) saturate(150%);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .logo {
      font-family: var(--font-heading);
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: 2px;
      color: #ffffff;
      text-shadow: 0 0 12px rgba(255, 255, 255, 0.15);
      white-space: nowrap;
    }

    .nav-links {
      display: flex;
      gap: 2.2rem;
      list-style: none;
      align-items: center;
      flex-wrap: wrap;
    }

    .nav-links a {
      text-decoration: none;
      color: #e0dcd0;
      font-weight: 500;
      font-size: 0.9rem;
      padding: 0.35rem 0;
      position: relative;
      transition: 0.3s;
      letter-spacing: 0.6px;
      text-transform: uppercase;
    }

    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 0;
      height: 2px;
      background: currentColor;
      transition: width 0.35s ease;
    }

    .nav-links a:hover {
      color: #ffffff;
    }
    .nav-links a:hover::after {
      width: 100%;
    }

    .server-toggle {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: #ddd;
      font-weight: 600;
      font-size: 0.8rem;
      padding: 0.4rem 1.4rem;
      border-radius: 4px;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: all 0.25s;
      letter-spacing: 1px;
    }
    .server-toggle:hover {
      border-color: rgba(255, 255, 255, 0.4);
      background: rgba(255, 255, 255, 0.08);
    }

    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      z-index: 1100;
    }
    .hamburger span {
      width: 25px;
      height: 2px;
      background: #fff;
      transition: 0.3s;
    }

    @media (max-width: 850px) {
      .nav-links {
        position: fixed;
        top: 0;
        right: -100%;
        width: 70%;
        height: 100vh;
        background: rgba(10, 10, 18, 0.95);
        backdrop-filter: blur(20px);
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 2.5rem;
        transition: right 0.4s ease;
        z-index: 1050;
      }
      .nav-links.active {
        right: 0;
      }
      .hamburger {
        display: flex;
      }
    }

    .hero {
      position: relative;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: #fff;
      overflow: hidden;
    }
    .hero-video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }
    .hero-overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: linear-gradient(180deg, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.8) 100%);
      z-index: 1;
    }
    .hero-content {
      position: relative;
      z-index: 2;
      padding: 0 2rem;
      max-width: 900px;
      text-shadow: 0 0 60px rgba(0,0,0,0.9);
      animation: fadeInUp 1s ease;
    }
    .hero h1 {
      font-family: var(--font-heading);
      font-size: clamp(2.8rem, 7vw, 5.2rem);
      font-weight: 900;
      margin-bottom: 0.8rem;
      text-align: left;
      line-height: 1.15;
    }
    .hero .sub {
      font-size: 1.15rem;
      font-weight: 300;
      opacity: 0.85;
      text-align: left;
      border-left: 3px solid rgba(255,255,255,0.6);
      padding-left: 1.6rem;
      margin-top: 1.2rem;
    }
    .scroll-indicator {
      position: absolute;
      bottom: 2.4rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      z-index: 3;
      opacity: 0.5;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .section {
      padding: 5rem 6%;
      position: relative;
      z-index: 2;
      background: transparent;
    }
    .section.dark {
      background: rgba(5, 5, 12, 0.5);
    }
    .container {
      max-width: 1250px;
      margin: 0 auto;
    }
    .section-label {
      font-size: 0.7rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      opacity: 0.7;
      margin-bottom: 0.5rem;
      font-weight: 600;
    }
    h2 {
      font-family: var(--font-heading);
      font-size: 2.4rem;
      margin-bottom: 2rem;
      font-weight: 800;
      text-align: left;
    }
    .video-section {
      position: relative;
      width: 100%;
      margin: 2.5rem 0;
      border-radius: 4px;
      overflow: hidden;
      min-height: 420px;
      display: flex;
      align-items: center;
      background: #000;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .video-section video {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: 0;
      opacity: 0.5;
    }
    .video-section .video-overlay {
      position: relative;
      z-index: 2;
      padding: 3rem 6%;
      width: 100%;
      background: linear-gradient(90deg, rgba(0,0,0,0.75) 0%, rgba(0,0,0,0.3) 100%);
    }

    .timeline-display {
      min-height: 180px;
      transition: opacity 0.25s ease;
      margin-bottom: 2rem;
    }
    .timeline-display h3 {
      font-family: var(--font-heading);
      font-size: 2.2rem;
      margin-bottom: 0.5rem;
      color: #fff;
      font-weight: 700;
    }
    .timeline-display .subtitle {
      font-size: 1.1rem;
      opacity: 0.8;
      max-width: 600px;
      line-height: 1.6;
    }
    .timeline-track {
      display: flex;
      align-items: center;
      gap: 0.2rem;
      flex-wrap: wrap;
      margin: 1.5rem 0;
      overflow-x: auto;
      padding: 0.5rem 0;
    }
    .timeline-item {
      position: relative;
      cursor: pointer;
      padding: 0.6rem 0.8rem;
      border-bottom: 2px solid rgba(255,255,255,0.2);
      transition: 0.3s;
      white-space: nowrap;
      font-weight: 600;
      font-size: 0.9rem;
      color: #aaa;
      user-select: none;
    }
    .timeline-item.active {
      color: #fff;
      border-bottom-color: var(--accent);
      text-shadow: 0 0 8px var(--accent-glow);
    }
    .timeline-arrow {
      color: rgba(255,255,255,0.3);
      font-size: 1.2rem;
      display: flex;
      align-items: center;
    }

    .weather-card {
      background: rgba(20,20,28,0.65);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 8px;
      padding: 1.5rem;
      display: inline-flex;
      align-items: center;
      gap: 1.5rem;
      margin: 1.5rem 0;
      flex-wrap: wrap;
    }
    .weather-temp {
      font-size: 2.8rem;
      font-weight: 700;
      line-height: 1;
    }
    .weather-details {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
    }

    .link-text {
      color: #ccc;
      text-decoration: underline;
      text-underline-offset: 3px;
      transition: 0.2s;
    }
    .link-text:hover { color: #fff; }

    .footer {
      background: #020208;
      color: #6e6e6e;
      padding: 3rem 6%;
      font-size: 0.8rem;
      border-top: 1px solid rgba(255,255,255,0.04);
    }
    .footer-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 2rem;
      max-width: 1250px;
      margin: 0 auto;
    }

    .masonry {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1.8rem;
      margin: 2rem 0;
    }
    .masonry .card-wide {
      grid-column: span 2;
    }
    @media (max-width: 600px) {
      .masonry .card-wide {
        grid-column: span 1;
      }
    }
    .card {
      background: rgba(20,20,28,0.55);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 6px;
      padding: 1.8rem;
      transition: 0.4s;
    }
    .card:hover {
      border-color: rgba(255,255,255,0.2);
      transform: translateY(-4px);
    }
    .card h3 {
      font-family: var(--font-heading);
      margin-bottom: 0.8rem;
    }
  </style>
</head>

        { level:'Lv.0–3', title:'降临·初始加载', desc:'角色创建完成，系统进行基础硬件调试。语言模块、行走模块依次激活，亲情羁绊建立。' },

        const itemsHtml = timelineData.map((item, idx) => `

      function bindTimelineEvents(data) {
        const display = document.getElementById('timelineDisplay');
        const items = document.querySelectorAll('.timeline-item');
        if (!display || items.length===0) return;
        function setActive(index) {
          items.forEach(i => i.classList.remove('active'));
          items[index].classList.add('active');
          const d = data[index];
          display.style.opacity = 0;
          setTimeout(() => {
            display.innerHTML = `<h3>${d.title}</h3><p class="subtitle">${d.desc}</p>`;
            display.style.opacity = 1;
          }, 150);
        }
        items.forEach((item, idx) => item.addEventListener('click', () => setActive(idx)));
        setActive(0);

            </div>
            <div class="video-section">

              <div class="video-overlay"><h2>中国山河，从哪里来？</h2><p>地质纪元资料片 · 板块运动雕琢出华夏骨骼。</p></div>

      function render(region) {
        const d = content[region];
        if (!d) return;
        body.className = region;
        // 更新标题标签
        pageTitle.textContent = region==='cn' ? '地球Online｜开放世界游戏' : 'Earth Online｜Open World Game';
        logoText.textContent = region==='cn' ? '地球Online' : 'Earth Online';
        const navT = navTexts[region];
        const links = ['home','database','guide','about'];
        navLinksContainer.innerHTML = navT.map((t,i)=>`<li><a href="#${links[i]}">${t}</a></li>`).join('');
        regionToggleBtn.textContent = region==='cn' ? 'CN' : 'EN';

        heroVideo.src = region==='cn' ? heroVideoChina : heroVideoWorld;
        heroVideo.load();
        heroContent.innerHTML = `<h1>${d.hero.title}</h1><p class="sub">${d.hero.sub}</p>`;
        databaseContent.innerHTML = d.database;
        guideContent.innerHTML = d.guide;
        aboutContent.innerHTML = d.about;
        footerContent.innerHTML = d.footer;

        const timelineData = region==='cn' ? timelineCN : timelineWorld;
        setTimeout(() => bindTimelineEvents(timelineData), 80);
      }

      regionToggleBtn.addEventListener('click', ()=>{
        const next = body.className.includes('cn') ? 'world' : 'cn';
        render(next);
        window.scrollTo({ top:0, behavior:'smooth' });
      });

      window.addEventListener('scroll', () => {
        if (window.scrollY > 50) navbar.classList.add('scrolled');
        else navbar.classList.remove('scrolled');
      });

      hamburger.addEventListener('click', () => {
        navLinksContainer.classList.toggle('active');
      });
      navLinksContainer.addEventListener('click', (e) => {
        if (e.target.tagName === 'A') {
          e.preventDefault();
          const id = e.target.getAttribute('href').replace('#','');
          const el = document.getElementById(id);
          if (el) el.scrollIntoView({ behavior:'smooth', block:'start' });
          navLinksContainer.classList.remove('active');
        }
      });

      document.addEventListener('mousemove', e => {
        cursorGlow.style.background = `radial-gradient(circle 300px at ${e.clientX}px ${e.clientY}px, rgba(255,255,255,0.06), transparent 70%)`;
      });

      render('cn');
    })();
