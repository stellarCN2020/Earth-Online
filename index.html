<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes, viewport-fit=cover">
  <title>地球Online · 官网</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #b31b1b;
      --primary-soft: #d44c4c;
      --bg-dark: #0d0f12;
      --bg-section: #f4f1ec;
      --text-dark: #1e1e1e;
      --text-light: #f5f0eb;
      --accent: #c9a55c;
      --card-bg: rgba(255, 248, 240, 0.88);
      --nav-bg: rgba(8, 8, 12, 0.92);
      --font-heading: 'Noto Serif SC', 'Times New Roman', '宋体', serif;
      --font-body: 'Inter', 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
      --shadow-card: 0 18px 35px rgba(0,0,0,0.1);
      --border-radius: 0.9rem;
      transition: background-color 0.3s, color 0.3s;
    }

    body {
      font-family: var(--font-body);
      background-color: #0b0b10;
      color: var(--text-dark);
      line-height: 1.5;
      overflow-x: hidden;
      margin: 0;
      transition: background-color 0.3s, color 0.3s;
    }

    body.cn {
      --primary: #b31b1b;
      --primary-soft: #c43b3b;
      --bg-dark: #120c0a;
      --bg-section: #faf8f5;
      --text-dark: #2c231d;
      --accent: #c9a55c;
      --card-bg: rgba(255, 250, 245, 0.9);
    }

    body.world {
      --primary: #1e5b7c;
      --primary-soft: #3a7ca5;
      --bg-dark: #0a1922;
      --bg-section: #eef3f8;
      --text-dark: #1a2a35;
      --accent: #4f9fcf;
      --card-bg: rgba(255, 255, 255, 0.88);
    }

    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 1000;
      background: var(--nav-bg);
      backdrop-filter: blur(15px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.6rem 5%;
      box-shadow: 0 6px 22px rgba(0,0,0,0.4);
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .logo {
      font-family: var(--font-heading);
      font-size: 1.7rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: 2px;
      white-space: nowrap;
    }

    .nav-links {
      display: flex;
      gap: 1.8rem;
      list-style: none;
      align-items: center;
      flex-wrap: wrap;
    }

    .nav-links a {
      text-decoration: none;
      color: #e0e0e0;
      font-weight: 500;
      font-size: 0.95rem;
      padding: 0.3rem 0;
      border-bottom: 2px solid transparent;
      transition: 0.2s;
      white-space: nowrap;
    }

    .nav-links a:hover {
      border-bottom-color: var(--accent);
      color: #fff;
    }

    .server-btn-wrap {
      position: relative;
    }

    .server-toggle {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.25);
      color: #fff;
      font-weight: 600;
      font-size: 0.85rem;
      padding: 0.4rem 1.2rem;
      border-radius: 2rem;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: 0.2s;
      letter-spacing: 0.5px;
    }

    .server-toggle:hover {
      background: var(--primary);
      border-color: var(--primary);
    }

    .hero {
      position: relative;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: #fff;
      overflow: hidden;
    }

    .hero-video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    .hero-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.55);
      z-index: 1;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      text-shadow: 0 0 30px rgba(0,0,0,0.7);
      padding: 0 2rem;
      max-width: 900px;
    }

    .hero h1 {
      font-family: var(--font-heading);
      font-size: clamp(2.8rem, 8vw, 5.5rem);
      font-weight: 800;
      margin-bottom: 0.5rem;
      text-align: left;
    }

    .hero .sub {
      font-size: 1.2rem;
      font-weight: 300;
      opacity: 0.9;
      text-align: left;
      border-left: 4px solid var(--accent);
      padding-left: 1.5rem;
      margin-top: 1rem;
    }

    .scroll-indicator {
      position: absolute;
      bottom: 2.2rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      z-index: 3;
      opacity: 0.7;
    }

    .scroll-indicator svg {
      width: 20px;
      height: 20px;
      fill: #fff;
    }

    .scroll-indicator span {
      font-size: 0.7rem;
      color: #ccc;
      letter-spacing: 2px;
    }

    .section {
      padding: 4.5rem 5%;
      background: var(--bg-section);
      color: var(--text-dark);
      transition: background 0.3s, color 0.3s;
      position: relative;
      z-index: 2;
    }

    .section.dark-bg {
      background: #121217;
      color: #e0e0e0;
    }

    .container {
      max-width: 1250px;
      margin: 0 auto;
    }

    h2 {
      font-family: var(--font-heading);
      font-size: 2.6rem;
      margin-bottom: 2rem;
      position: relative;
      display: block;
      font-weight: 700;
      text-align: left;
    }

    h2::after {
      content: '';
      position: absolute;
      bottom: -8px;
      left: 0;
      width: 55px;
      height: 4px;
      background: var(--primary);
      border-radius: 2px;
    }

    .video-section {
      position: relative;
      width: 100%;
      margin: 2.5rem 0;
      border-radius: var(--border-radius);
      overflow: hidden;
      min-height: 450px;
      display: flex;
      align-items: center;
      background: #000;
    }

    .video-section video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
      opacity: 0.65;
      transition: opacity 0.3s;
    }

    .video-section .video-overlay {
      position: relative;
      z-index: 2;
      padding: 3rem 5%;
      width: 100%;
      background: linear-gradient(90deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.4) 100%);
    }

    .video-section h2 {
      color: #fff;
      text-shadow: 0 2px 10px rgba(0,0,0,0.8);
      margin-bottom: 1rem;
      font-size: 2.4rem;
    }

    .video-section p {
      color: #ddd;
      font-size: 1.1rem;
      max-width: 600px;
      line-height: 1.6;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1.8rem;
      margin: 2rem 0;
    }

    .card {
      background: var(--card-bg);
      backdrop-filter: blur(8px);
      border-radius: var(--border-radius);
      padding: 1.8rem;
      box-shadow: var(--shadow-card);
      border: 1px solid rgba(0,0,0,0.05);
      transition: transform 0.25s ease, opacity 0.6s ease, translate 0.6s ease;
      opacity: 0;
      translate: 0 30px;
      color: var(--text-dark);
    }

    .dark-bg .card {
      background: rgba(30, 30, 40, 0.8);
      color: #f0f0f0;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .card.visible {
      opacity: 1;
      translate: 0 0;
    }

    .card:hover {
      transform: translateY(-6px);
    }

    .card h3 {
      font-size: 1.5rem;
      margin-bottom: 0.7rem;
      color: var(--primary);
    }

    .link-text {
      color: var(--accent);
      font-weight: 600;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .footer {
      background: #0a0a0e;
      color: #a0a0a0;
      padding: 2.8rem 5%;
      font-size: 0.85rem;
      border-top: 1px solid #222;
    }

    .footer-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 2rem;
      max-width: 1250px;
      margin: 0 auto;
    }

    .footer a {
      color: #ccc;
      text-decoration: none;
    }

    @media (max-width: 700px) {
      .navbar {
        flex-direction: column;
        align-items: flex-start;
      }
      .nav-links {
        gap: 1rem;
        width: 100%;
        justify-content: space-around;
      }
      .hero h1 {
        font-size: 2.4rem;
      }
      .video-section h2 {
        font-size: 1.8rem;
      }
    }
  </style>
</head>

        regionToggleBtn.textContent = region === 'cn' ? 'CN' : 'EN';

        // 视频背景切换
        if (region === 'cn') {
          heroVideo.src = heroVideoChina;
        } else {
          heroVideo.src = heroVideoWorld;
        }
        heroVideo.load();

        // 填充内容
        heroContent.innerHTML = `<h1>${d.hero.title}</h1><p class="sub">${d.hero.sub}</p>`;
        databaseContent.innerHTML = d.database;
        guideContent.innerHTML = d.guide;
        aboutContent.innerHTML = d.about;
        footerContent.innerHTML = d.footer;

        // 重新观察卡片动画
        setTimeout(() => {
          observeCards();
        }, 80);
      }

      // 直接切换区服，无弹窗
      regionToggleBtn.addEventListener('click', () => {
        const currentRegion = body.className.includes('cn') ? 'cn' : 'world';
        const nextRegion = currentRegion === 'cn' ? 'world' : 'cn';
        render(nextRegion);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });

      // 渐入动画观察器
      function observeCards() {
        const cards = document.querySelectorAll('.card');
        if (!('IntersectionObserver' in window)) {
          cards.forEach(c => c.classList.add('visible'));
          return;
        }
        const observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              entry.target.classList.add('visible');
              observer.unobserve(entry.target);
            }
          });
        }, { threshold: 0.2, rootMargin: '0px 0px -30px 0px' });
        cards.forEach(c => observer.observe(c));
      }

      // 初始渲染中国区
      render('cn');
      window.addEventListener('load', () => {
        observeCards();
      });

      // 导航平滑滚动
      navLinksContainer.addEventListener('click', (e) => {
        if (e.target.tagName === 'A') {
          e.preventDefault();
          const id = e.target.getAttribute('href')?.replace('#', '');
          const el = document.getElementById(id);
          if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
      });

    })();
  </script>
</body>
</html>
